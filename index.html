<!DOCTYPE html>
<meta name="author" content="Pablo Legari">
<meta name="copyright" content="© 2026 Pablo Legari">
<meta name="date" content="2026-05-22">
<meta name="licence" content="GPL">
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixl1 Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #0f1117;
  --bg2: #181c27;
  --bg3: #1f2435;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f2f8;
  --text2: #8b90a8;
  --text3: #555b75;
  --pink: #e8547a;
  --pink-dim: rgba(232,84,122,0.12);
  --blue: #4a9eff;
  --blue-dim: rgba(74,158,255,0.12);
  --green: #3ecf7c;
  --green-dim: rgba(62,207,124,0.12);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --red: #ff5e5e;
  --red-dim: rgba(255,94,94,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ── HEADER ── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.logo {
  font-family: 'Space Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
  white-space: nowrap;
}
.logo span { color: var(--green); }

.version {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 1px;
  color: var(--text3);
  margin-top: 2px;
}

.setup-fields {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  flex: 1;
  align-items: center;
}

.setup-fields input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 7px 12px;
  outline: none;
  transition: border-color 0.15s;
}
.setup-fields input:focus { border-color: var(--green); }
.setup-fields input[type=date] { width: 148px; color-scheme: dark; }
.setup-fields input:not([type=date]) { width: 150px; }

/* ── SCOREBOARD ── */
.scoreboard {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
  margin: 0;
  border-bottom: 1px solid var(--border);
}

.team-panel {
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: var(--bg2);
  position: relative;
}
.team-panel.left { border-right: 1px solid var(--border); }

.team-name-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}

.score-big {
  font-family: 'Space Mono', monospace;
  font-size: 80px;
  line-height: 1;
  font-weight: 700;
  color: var(--text);
  transition: transform 0.1s;
}

.score-btns {
  display: flex;
  gap: 8px;
}

.btn-score {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-score.add { background: var(--green-dim); border-color: var(--green); color: var(--green); font-weight: 600; }
.btn-score.sub { color: var(--text3); }
.btn-score:hover { filter: brightness(1.2); }
.btn-score:active { transform: scale(0.96); }

.vs-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  background: var(--bg2);
  gap: 8px;
}

.vs-txt {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 3px;
}

/* ── LINE INDICATOR ── */
.line-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 24px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.line-label {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
}

.line-badge {
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.line-badge.f { background: var(--pink-dim); border-color: var(--pink); color: var(--pink); }
.line-badge.m { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.line-badge.none { background: var(--bg3); border-color: var(--border2); color: var(--text3); }

.line-override {
  display: flex;
  gap: 6px;
  margin-left: auto;
  align-items: center;
}
.line-override span { font-size: 11px; color: var(--text3); }
.btn-line {
  padding: 4px 12px;
  border-radius: 16px;
  border: 1px solid var(--border2);
  background: transparent;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
}
.btn-line:hover { border-color: var(--border2); background: var(--bg2); }
.btn-line.active-f { background: var(--pink-dim); border-color: var(--pink); color: var(--pink); }
.btn-line.active-m { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

/* ── MAIN LAYOUT ── */
.main {
  display: grid;
  grid-template-columns: 1fr 340px;
  min-height: calc(100vh - 220px);
}

.left-col { border-right: 1px solid var(--border); }
.right-col { background: var(--bg2); }

/* ── TABS ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  background: var(--bg2);
}

.tab {
  padding: 14px 18px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: -1px;
  letter-spacing: 0.3px;
}
.tab:hover { color: var(--text2); }
.tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }

.pane { display: none; padding: 20px 24px; }
.pane.active { display: block; }


/* ── STATS RIGHT COL ── */
.stats-panel { padding: 20px; }
.stats-title {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 14px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.stat-row:last-child { border-bottom: none; }
.stat-lbl { color: var(--text2); }
.stat-val { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--text); }
.stat-val.green { color: var(--green); }
.stat-val.pink { color: var(--pink); }
.stat-val.blue { color: var(--blue); }

/* ── BAR CHART ── */
.bar-section { margin-top: 18px; }
.bar-item { margin-bottom: 8px; }
.bar-meta { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
.bar-name { color: var(--text2); }
.bar-num { font-family: 'Space Mono', monospace; color: var(--text3); }
.bar-track { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

/* ── PIE ── */
.pie-wrap { margin-top: 18px; display: flex; align-items: center; gap: 16px; }
canvas { flex-shrink: 0; }
.pie-legend { display: flex; flex-direction: column; gap: 6px; }
.pie-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--text2); }
.pie-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── ACTIONS ── */
.actions-bar {
  display: flex;
  gap: 10px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-wrap: wrap;
}

.btn-action {
  padding: 9px 20px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text2);
}
.btn-action:hover { background: var(--bg3); color: var(--text); }
.btn-action.export { background: var(--green-dim); border-color: var(--green); color: var(--green); font-weight: 500; }
.btn-action.export:hover { filter: brightness(1.1); }
.btn-action.reset { color: var(--red); border-color: var(--red); }
.btn-action.reset:hover { background: var(--red-dim); }
.btn-action.link { color: var(--blue); border-color: var(--blue); }
.btn-action.link:hover { background: var(--blue-dim); }
.btn-action.undo { color: var(--amber); border-color: var(--amber); }
.btn-action.undo:hover { background: var(--amber-dim); }
.btn-action.undo:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border2); color: var(--text3); background: transparent; }

@keyframes undoPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.93); }
  100% { transform: scale(1); }
}
.undo-pop { animation: undoPop 0.2s ease; }


.player-buttons {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.player-btn {
  padding: 14px 10px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
}

.player-btn.female {
  background: var(--pink-dim);
  border-color: var(--pink);
  color: var(--pink);
}

.player-btn.male {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

.player-btn:hover {
  transform: translateY(-1px);
  border-color: var(--green);
  background: var(--green-dim);
}

.thrower-panel {
  margin-top: 10px;
  margin-bottom: 10px;
  padding: 14px;
  border-radius: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
}

.thrower-name {
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
}

.players-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.players-title {
  font-size: 16px;
  font-weight: 700;
}

.players-count {
  font-family: 'Space Mono', monospace;
  color: var(--text2);
}

.roster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.roster-btn {
  padding: 14px 10px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
}

.roster-btn.female {
  background: var(--pink-dim);
  border-color: var(--pink);
  color: var(--pink);
}

.roster-btn.male {
  background: var(--blue-dim);
  border-color: var(--blue);
  color: var(--blue);
}

.roster-btn:hover {
  transform: translateY(-1px);
}

.roster-btn.selected {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.event-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.event-btn {
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.15s;
}

.event-btn:hover {
  transform: translateY(-1px);
}

.event-btn.goal {
  border-color: var(--green);
  color: var(--green);
}

.event-btn.throwaway,
.event-btn.drop {
  border-color: var(--red);
  color: var(--red);
}

.event-btn.defense,
.event-btn.interception {
  border-color: var(--blue);
  color: var(--blue);
}

.event-btn.injury {
  border-color: var(--amber);
  color: var(--amber);
}

/* STATS TAB */

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

.player-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}

.player-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.player-card-name {
  font-size: 18px;
  font-weight: 700;
}

.player-card-gender {
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
}

.player-card-gender.f {
  background: var(--pink-dim);
  color: var(--pink);
}

.player-card-gender.m {
  background: var(--blue-dim);
  color: var(--blue);
}

.player-stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}

.player-stat {
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px;
}

.player-stat-label {
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
  text-transform: uppercase;
}

.player-stat-value {
  font-size: 18px;
  font-weight: 700;
}


/* ── PASS BUTTON DISABLED ── */
.pass-btn.dim {
  opacity: 0.2;
  cursor: not-allowed;
  pointer-events: none;
}

/* ── SAVE INDICATOR ── */
.btn-save {
  padding: 5px 12px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'DM Sans', sans-serif;
}
.btn-save:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); display: inline-block; transition: background 0.4s; }
.save-dot.ok { background: var(--green); }
.btn-theme {
  padding: 5px 10px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text3);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}
.btn-theme:hover { border-color: var(--amber); background: var(--amber-dim); }
body.light .btn-theme { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
.header-top { display: flex; align-items: center; gap: 8px; }

/* ── POINT FLASH ── */
@keyframes scoreFlash {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.score-big.flash { animation: scoreFlash 0.3s ease; }


/* ── LIGHT THEME ── */
body.light {
  --bg: #f4f5f7;
  --bg2: #ffffff;
  --bg3: #eaecf0;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.18);
  --text: #1a1d27;
  --text2: #4a5068;
  --text3: #909ab8;
  --pink: #c93060;
  --pink-dim: rgba(201,48,96,0.1);
  --blue: #1a6fd4;
  --blue-dim: rgba(26,111,212,0.1);
  --green: #1a9e58;
  --green-dim: rgba(26,158,88,0.1);
  --amber: #b86800;
  --amber-dim: rgba(184,104,0,0.1);
  --red: #d93838;
  --red-dim: rgba(217,56,56,0.09);
}
body.light .setup-fields input { color-scheme: light; }

/* ── RESPONSIVE / MOBILE ── */
@media (max-width: 640px) {
  /* Header: stack inputs below logo row */
  .header {
    padding: 10px 14px;
    gap: 8px;
    flex-direction: column;
    align-items: stretch;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .setup-fields {
    flex-direction: row;
    flex-wrap: wrap;
    gap: 6px;
  }
  .setup-fields input:not([type=date]) { flex: 1; min-width: 100px; width: auto; }
  .setup-fields input[type=date] { width: 140px; }

  /* Scoreboard: tighter */
  .team-panel { padding: 14px 10px; gap: 6px; }
  .score-big { font-size: 60px; }
  .vs-col { padding: 0 10px; }
  .btn-score { padding: 8px 12px; font-size: 12px; }

  /* Line bar + receiver bar: compact single rows */
  .line-bar { padding: 7px 12px; gap: 8px; }
  .receiver-bar { padding: 7px 12px; gap: 8px; }
  .line-override span { display: none; }

  /* Main: single column, passes first */
  .main { grid-template-columns: 1fr; }
  .left-col { border-right: none; border-bottom: 1px solid var(--border); }
  .right-col { background: var(--bg); }

  /* Pass buttons: bigger tap targets */
  .pane { padding: 12px 14px; }
  .pass-grid { gap: 8px; }
  .pass-btn { padding: 16px 8px; }
  .pass-arrow { font-size: 20px; }
  .pass-cnt-pt { font-size: 26px; }

  /* Error grid: 2 cols on mobile (3 too cramped) */
  .err-grid { grid-template-columns: 1fr 1fr; }
  .err-btn { padding: 14px 6px; }
  .err-cnt-pt { font-size: 22px; }

  /* Tabs */
  .tabs { padding: 0 14px; }
  .tab { padding: 12px 14px; }

  /* Actions bar */
  .actions-bar { padding: 12px 14px; }
  .btn-action { flex: 1; text-align: center; }

  /* Stats panel */
  .stats-panel { padding: 14px; }

  
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">TRACKER</div>
    <div class="version">v1.1.3</div>
    <button class="btn-save" onclick="saveSession()" title="Save">
      <span class="save-dot ok" id="saveDot"></span>
      <span id="saveLabel">Saved</span>
    </button>
    <button class="btn-theme" onclick="toggleTheme()" id="btnTheme" title="Change dark/light theme">☀</button>
  </div>
  <div class="setup-fields">
    <input id="nameA" value="Team A" placeholder="Team A" oninput="updateNames()">
    <input id="nameB" value="Team B" placeholder="Team B" oninput="updateNames()">
    <input id="matchDate" type="date">
  </div>
</div>

<div class="scoreboard">
  <div class="team-panel left">
    <div class="team-name-lbl" id="lblA">Mixl</div>
    <div class="score-big" id="scoreA">0</div>
    <div class="score-btns">
      <button class="btn-score add" onclick="addPoint('A')">+1 point</button>
      <button class="btn-score sub" onclick="removePoint('A')">−1</button>
    </div>
  </div>
  <div class="vs-col">
    <div class="vs-txt">VS</div>
  </div>
  <div class="team-panel">
    <div class="team-name-lbl" id="lblB">Opponent</div>
    <div class="score-big" id="scoreB">0</div>
    <div class="score-btns">
      <button class="btn-score add" onclick="addPoint('B')">+1 point</button>
      <button class="btn-score sub" onclick="removePoint('B')">−1</button>
    </div>
  </div>
</div>

<div class="line-bar">
  <span class="line-label">GENDER RATIO:</span>
  <div class="line-badge none" id="lineBadge">Not defined</div>
  <div class="line-override">
    <span>Initial ratio:</span>
    <button class="btn-line" id="btnF" onclick="forceLine('F')">W</button>
    <button class="btn-line" id="btnM" onclick="forceLine('M')">M</button>
  </div>
</div>


<div class="main">
  <div class="left-col">
    <div class="thrower-panel">
      <div id="statusMessageDisplay" class="thrower-name">
        Hello
      </div>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="showTab('players')">Players</button>
      <button class="tab" onclick="showTab('offense')">Offense</button>
      <button class="tab" onclick="showTab('defense')">Defense</button>
      <button class="tab" onclick="showTab('stats')">Stats</button>
    </div>

    <div id="pane-players" class="pane active">
        <div class="players-header">
            <div class="players-title">Select 7 players for this point</div>
            <div id="playersPrompt"></div>
            <div class="players-count">
            <span id="activeCount">0</span>/7 selected
            </div>
        </div>

        <div id="rosterButtons" class="roster-grid"></div>

        <button class="btn-action export"
                id="startPointBtn"
                onclick="startPoint()"
                disabled>
            Start Point
        </button>
    </div>


    <div id="pane-offense" class="pane">
           
      <div id="playerButtons" class="player-buttons"></div>
      <div class="event-grid">

    <button class="event-btn goal"
            onclick="recordGoal(currentThrower)">
        Goal
    </button>

    <button class="event-btn throwaway"
            onclick="recordThrowaway()">
        Throwaway
    </button>

    <button class="event-btn drop"
            onclick="recordDrop()">
        Drop
    </button>

    <button class="event-btn injury"
            onclick="recordInjury()">
        Injury
    </button>

</div>
    </div>

    <div id="pane-defense" class="pane">
      
      
      <div class="event-grid">
        <button class="event-btn defense"
                onclick="recordOpponentThrowaway()">
            Opp. Throwaway
        </button>

        <button class="event-btn goal"
                onclick="recordOpponentGoal()">
            Opp. Goal
        </button>

        <button class="event-btn defense"
                onclick="recordDefense()">
            Defense
        </button>

        <button class="event-btn interception"
                onclick="recordInterception()">
            Interception
        </button>

        <button class="event-btn injury"
                onclick="recordInjury()">
            Injury
        </button>

        </div>
    </div>

    <div id="pane-stats" class="pane">
      <div id="statsContainer" class="stats-grid"></div>
    </div>

    <div class="actions-bar">
      <button class="btn-action reset" onclick="resetAll()">Restart</button>
      <button class="btn-action undo" id="btnUndo" onclick="undo()" disabled title="Undo last action (Ctrl+Z)">↩ Undo</button>
      <button class="btn-action export" onclick="exportXLSX()">Export XLSX</button> 
      <button class="btn-action link" id="btnLink" onclick="copySessionLink()">Lien session</button>
    </div>
  </div>

  <div class="right-col">
    <div class="stats-panel">
      <div class="stats-title">Global Statistics</div>

      <div class="stat-row"><span class="stat-lbl">Total passes</span><span class="stat-val" id="st-total">0</span></div>
      <div class="stat-row"><span class="stat-lbl">Mixed passes (F↔M)</span><span class="stat-val green" id="st-mixed">0</span></div>
      <div class="stat-row"><span class="stat-lbl">% Mixity</span><span class="stat-val green" id="st-pct">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Completion %</span><span class="stat-val green" id="st-completion">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Longest Possession</span><span class="stat-val green" id="st-possession">0</span></div>

      <div class="bar-section">
        <div class="bar-item">
          <div class="bar-meta"><span class="bar-name">F → F</span><span class="bar-num" id="bv-FF">0</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf-FF" style="width:0%;background:#e8547a"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-meta"><span class="bar-name">M → M</span><span class="bar-num" id="bv-MM">0</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf-MM" style="width:0%;background:#4a9eff"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-meta"><span class="bar-name">F → M</span><span class="bar-num" id="bv-FM">0</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf-FM" style="width:0%;background:#3ecf7c"></div></div>
        </div>
        <div class="bar-item">
          <div class="bar-meta"><span class="bar-name">M → F</span><span class="bar-num" id="bv-MF">0</span></div>
          <div class="bar-track"><div class="bar-fill" id="bf-MF" style="width:0%;background:#f5a623"></div></div>
        </div>
      </div>

      <div class="pie-wrap">
        <canvas id="pieChart" width="100" height="100"></canvas>
        <div class="pie-legend" id="pieLegend"></div>
      </div>

      
    </div>
  </div>
</div>

<script>

// =====================================================
// STATE
// =====================================================

const ABBA_SEQ = ['F','M','M','F']; // 4-cycle

let statusMessage = "Hello";

let currentThrower = null;

let previousThrower = null; 

let activePlayers = [];

let possession = "offense";

let pendingDefense = false;

let injuredPlayer = null;

let injuryMode = false;

let eventTextLog = [];

let currentPossessionPasses = 0;

let longestPossession = 0;

let activeTab = "players";

const undoStack = []; // stack of {state snapshot, receiver}
const UNDO_MAX = 30;  // max undo depth

const players = [
  { name: 'Barbara', gender: 'F' },
  { name: 'Camille', gender: 'F' },
  { name: 'Dirkje', gender: 'F' },
  { name: 'Mathilde', gender: 'F' },
  { name: 'Sarah', gender: 'F' },
  { name: 'Ben', gender: 'M' },
  { name: 'Lio', gender: 'M' },
  { name: 'Maxime', gender: 'M' },
  { name: 'Pablo', gender: 'M' },
  { name: 'Quentin', gender: 'M' },
  { name: 'Kat', gender: 'F' },
  { name: 'Ophélie', gender: 'F' },
  { name: 'Thémis', gender: 'F' },
  { name: 'Thérèse', gender: 'F' },
  { name: 'Zoé', gender: 'F' },
  { name: 'Greg', gender: 'M' },
  { name: 'Jeroen', gender: 'M' },
  { name: 'Louis', gender: 'M' },
  { name: 'Mitja', gender: 'M' }
];

let playerStats = {};

players.forEach(player => {

  playerStats[player.name] = {

    touches: 0,
    completions: 0,
    assists: 0,
    goals: 0,
    drops: 0,
    throwaways: 0,
    defenses: 0,
    pointsPlayed: 0
  };
});

let state = {
  scoreA: 0,
  scoreB: 0,
  lineOverride: 'F', // 'F'|'M' = ABBA offset; 'F' by default
  // per-point counters (reset each point)
  pt: { FF:0, MM:0, FM:0, MF:0, dropF:0, dropM:0, incF:0, incM:0, stallF:0, stallM:0 },
  // cumulative totals
  tot: { FF:0, MM:0, FM:0, MF:0, dropF:0, dropM:0, incF:0, incM:0, stallF:0, stallM:0 },
  lastPass: null, // last pass type this point
  pointLog: [],  // {num, team, score, lastPass, line, passes:{...}, errors:{...}}
  actionLog: [],  // full action-by-action log
  throwConnections: {},

  currentThrower: null,
  currentReceiver: null
};

players.forEach(p => {
  state.throwConnections[p.name] = {};
});

// =====================================================
// GAME LOGIC
// =====================================================

function pushUndo() {

  undoStack.push({
    state: structuredClone(state),
    playerStats:
      structuredClone(playerStats),
    currentThrower,
    previousThrower,
    activePlayers:
      structuredClone(activePlayers),
    possession,
    pendingDefense,
    injuryMode,
    injuredPlayer,
    statusMessage,
    activeTab:
      document.querySelector('.pane.active')
        ?.id
        ?.replace('pane-', '')
  });

  // optional max history
  if (undoStack.length > UNDO_MAX) {
    undoStack.shift();
  }
  
  updateUndoButton();
}

function recordPass(receiverName) {
  if (!currentThrower) {
    alert("Select initial thrower");
    return;
  }
  
  // Prevent self-pass
  if (receiverName === currentThrower) return;
  pushUndo();
  // Find player objects
  const thrower =
    players.find(p => p.name === currentThrower);
  const receiver =
    players.find(p => p.name === receiverName);
  // Determine pass type automatically
  const type = thrower.gender + receiver.gender;
  // Update pass stats
  state.pt[type]++;
  state.tot[type]++;
  state.lastPass = type;
  // Action log
  state.actionLog.push({
    time: new Date().toISOString(),
    type: 'pass',
    from: currentThrower,
    to: receiverName,
    detail: type,
    line: currentLine()
    });

  // Create nested object if needed
  if (!state.throwConnections[currentThrower][receiverName]) {
    state.throwConnections[currentThrower][receiverName] = 0;
  }

  // Increment connection count
  state.throwConnections[currentThrower][receiverName]++;

  // Status message
  statusMessage = `${currentThrower} -> ${receiverName}`;
  logEvent(`${currentThrower} -> ${receiverName}`);

  //Longest possession tracker
  currentPossessionPasses++;
  
  // Receiver becomes next thrower
  previousThrower = currentThrower;
  currentThrower = receiverName;


  playerStats[receiverName].touches++;
  playerStats[thrower.name].completions++;
  

  render();
}

function recordPoint(team) {
  const line = currentLine();
  const num = totalPoints();
  const teamName = team === 'A'
    ? (document.getElementById('nameA').value || 'Team A')
    : (document.getElementById('nameB').value || 'Team B');
  state.pointLog.push({
    num,
    team,
    teamName,
    scoreA: state.scoreA,
    scoreB: state.scoreB,
    lastPass: state.lastPass,
    line,
    passes: { ...state.pt },
    errors: { ...state.pt }
  });
}

function recordGoal(scorerName) {

  if (!currentThrower || !scorerName) return;

  pushUndo();

  // ============================================
  // TEAM SCORE
  // ============================================

  state.scoreA++;

  flashScore("scoreA");

  recordPoint("A");

  // reset per-point stats
  Object.keys(state.pt).forEach(k => {
    state.pt[k] = 0;
  });

  state.lastPass = null;

  // ============================================
  // PLAYER STATS
  // ============================================

  // scorer gets goal
  playerStats[scorerName].goals++;

  // Status Message
  statusMessage =  `${scorerName} scored!`;
  logEvent(`${scorerName} scored! ${state.scoreA} - ${state.scoreB}`);

  // thrower gets assist
  if (previousThrower) {

    playerStats[previousThrower].assists++;
  }
  // Longest possession tracker
  if (currentPossessionPasses > longestPossession) {
    longestPossession = currentPossessionPasses;
  }
  currentPossessionPasses = 0;
  // ============================================
  // NEXT POINT
  // ============================================

  currentThrower = null;
  previousThrower = null;

  activePlayers = [];

  possession = "defense";

  // go to player selection
  showTab("players");

  saveSession();

  render();
}

function recordDrop() {
  if (!currentThrower) return;
  pushUndo();
  playerStats[currentThrower].drops++;
  statusMessage = `${currentThrower} dropped the disc`;
  logEvent(`${currentThrower} dropped the disc`);
  possession = "defense";
  currentThrower = null;
  previousThrower = null;
  //Longest possession tracker
  const finalPossession =
    Math.max(0, currentPossessionPasses - 1);

  if (finalPossession > longestPossession) {
    longestPossession = finalPossession;
  }
  currentPossessionPasses = 0;
  
  showTab("defense");
  render();
}

function recordThrowaway() {
  if (!currentThrower) return;
  pushUndo();
  playerStats[currentThrower].throwaways++;
  statusMessage = `${currentThrower} threw it away`;
  logEvent(`${currentThrower} threw it away`);
  possession = "defense";
  currentThrower = null;
  previousThrower = null;
  //Longest possession tracker
  if (currentPossessionPasses > longestPossession) {
    longestPossession = currentPossessionPasses;
  }
  currentPossessionPasses = 0;

  showTab("defense");
  render();
}

function addPoint(team) {
  recordPoint(team);
  state['score' + team]++;
  flashScore('score' + team);
  // reset per-point counters
  Object.keys(state.pt).forEach(k => state.pt[k] = 0);
  state.lastPass = null;
  currentThrower = null;
  saveSession(); // auto-save on every point
  render();
}

function removePoint(team) {
  if (state['score' + team] <= 0) return;
  state['score' + team]--;
  if (state.pointLog.length > 0) state.pointLog.pop();
  render();
}

function setInitialThrower(name) {
  pushUndo();
  currentThrower = name;
  playerStats[name].touches++;
  statusMessage = `${name} picked up the disc`;
  logEvent(`${name} picked up the disc`);
  pendingDefense = false;
  render();
}

function toggleActivePlayer(name) {
  if (activePlayers.includes(name)) {
    activePlayers =
      activePlayers.filter(p => p !== name);
  }
  else {
    if (activePlayers.length >= 7) return;
    activePlayers.push(name);
  }
  renderRosterButtons();
}

function startPoint() {
  pushUndo();
  currentThrower = null;
  if (possession === "offense")
    statusMessage = "Point started. Select who picks up the disc";
  else
    statusMessage = "Point started";
  activePlayers.forEach(name => {
    playerStats[name].pointsPlayed++;
  });  
  logEvent(`Point started. ${activePlayers.join(", ")}`);
  showTab(possession);
  render();
}

function recordInjury() {
  pushUndo();
  injuryMode = true;

  injuredPlayer = null;
  
  showTab("players");
  
  renderRosterButtons();
}

function recordOpponentThrowaway() {
  pushUndo();
  possession = "offense";
  currentThrower = null;
  pendingDefense = false;
  statusMessage = "Opponents threw the disc away. Select who picks it up";
  logEvent("Opponent Throwaway");
  showTab("offense");
  render();
}

function recordDefense() {
  pushUndo();
  possession = "offense";
  currentThrower = null;
  pendingDefense = true;
  statusMessage = "Select who made the defense";
  logEvent("Defense");
  showTab("offense");
  render();
}

function recordInterception() {
  pushUndo();
  possession = "offense";
  pendingDefense = "interception";
  currentThrower = null;
  statusMessage = "Select who intercepted the disc";
  logEvent("Interception");
  showTab("offense");
  render();
}

function recordOpponentGoal() {
  pushUndo();
  addPoint("B");
  currentThrower = null;
  possession = "offense";
  activePlayers = [];
  statusMessage = "Opponents scored";
  logEvent(`Opponent goal. ${state.scoreA} - ${state.scoreB}`);
  showTab("players");
  render();
}

function undo() {
  if (undoStack.length === 0)
    return;

  const snapshot =
    undoStack.pop();

  state =
    structuredClone(snapshot.state);

  playerStats =
    structuredClone(snapshot.playerStats);

  currentThrower =
    snapshot.currentThrower;

  previousThrower =
    snapshot.previousThrower;

  activePlayers =
    structuredClone(snapshot.activePlayers);

  possession =
    snapshot.possession;

  pendingDefense =
    snapshot.pendingDefense;

  injuryMode =
    snapshot.injuryMode;

  injuredPlayer =
    snapshot.injuredPlayer;
  
  statusMessage = 
    snapshot.statusMessage;
  
  activeTab = 
    snapshot.activeTab;
  
    saveSession();
    updateUndoButton();
    showTab(activeTab);
    
    if (eventTextLog.length > 0) {
      eventTextLog.pop();
    }
  render();
}

function updateUndoButton() {

  const btn =
    document.getElementById('btnUndo');

  if (!btn) return;

  btn.disabled =
    undoStack.length === 0;
}

function forceLine(g) {
  state.lineOverride = state.lineOverride === g ? null : g;
  render();
}

// =====================================================
// UI COMPONENTS / EVENTS
// =====================================================

function totalPoints() { return state.scoreA + state.scoreB; }

function abbaLine() {
  const idx = (totalPoints()+ (state.lineOverride === 'F' ? 0 : state.lineOverride === 'M' ? 2 : 0)) % 4;
  return ABBA_SEQ[idx];
}

function currentLine() {
  //return state.lineOverride || abbaLine();
  return abbaLine();

}

function lineName(l) {
  if (l === 'F') return 'Women point';
  if (l === 'M') return 'Men point';
  return '—';
}


function passLabel(k) {
  return { FF:'F → F', MM:'G → G', FM:'F → G', MF:'G → F' }[k] || k;
}

// Ctrl+Z / Cmd+Z keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  }
});

function logEvent(text) {
  eventTextLog.push(text);
}

// =====================================================
// RENDER
// =====================================================

function render() {
  // scores
  document.getElementById('scoreA').textContent = state.scoreA;
  document.getElementById('scoreB').textContent = state.scoreB;

  // line
  const line = currentLine();
  const badge = document.getElementById('lineBadge');
  badge.textContent = lineName(line);
  badge.className = 'line-badge ' + (line === 'F' ? 'f' : line === 'M' ? 'm' : 'none');

  // override buttons
  document.getElementById('btnF').className = 'btn-line' + (state.lineOverride === 'F' ? ' active-f' : '');
  document.getElementById('btnM').className = 'btn-line' + (state.lineOverride === 'M' ? ' active-m' : '');

  // stats
  const p = state.tot;
  const total = p.FF + p.MM + p.FM + p.MF;
  const mixed = p.FM + p.MF;
  const e = state.tot;
  const errF = e.dropF + e.incF + e.stallF;
  const errM = e.dropM + e.incM + e.stallM;

  document.getElementById('st-total').textContent = total;
  document.getElementById('st-mixed').textContent = mixed;
  document.getElementById('st-pct').textContent = total > 0 ? Math.round(mixed / total * 100) + '%' : '—';
  
  // completion percentage

  const totalCompletions =
  Object.values(playerStats)
    .reduce((sum, p) => sum + p.completions, 0);

  const totalThrowaways =
    Object.values(playerStats)
      .reduce((sum, p) => sum + p.throwaways, 0);

  const completionPct =
    (totalCompletions + totalThrowaways) > 0
      ? Math.round(
          (totalCompletions /
            (totalCompletions + totalThrowaways)) * 100
        ) + '%'
      : '—';

  document.getElementById('st-completion').textContent =
    completionPct;
  
  document.getElementById('st-possession').textContent =
    Math.max(longestPossession, currentPossessionPasses);

  // bars
  ['FF','MM','FM','MF'].forEach(k => {
    const w = total > 0 ? Math.round(p[k] / total * 100) : 0;
    document.getElementById('bv-' + k).textContent = p[k];
    document.getElementById('bf-' + k).style.width = w + '%';
  });

  // pie
  renderPie(p, total);
  
  // player buttons
  renderPlayerButtons();
  renderRosterButtons();
}

function renderPie(p, total) {
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 100, 100);
  if (total === 0) {
    ctx.fillStyle = '#1f2435';
    ctx.beginPath(); ctx.arc(50, 50, 40, 0, Math.PI * 2); ctx.fill();
    document.getElementById('pieLegend').innerHTML = '';
    return;
  }
  const keys = ['FF','MM','FM','MF'];
  const colors = ['#e8547a','#4a9eff','#3ecf7c','#f5a623'];
  let start = -Math.PI / 2;
  keys.forEach((k, i) => {
    if (!p[k]) return;
    const slice = p[k] / total * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(50,50); ctx.arc(50,50,40,start,start+slice); ctx.closePath();
    ctx.fillStyle = colors[i]; ctx.fill();
    start += slice;
  });
  const labels = { FF:'F → F', MM:'G → G', FM:'F → G', MF:'G → F' };
  const leg = keys.map((k,i) => p[k] > 0
    ? `<div class="pie-item"><div class="pie-dot" style="background:${colors[i]}"></div><span>${labels[k]} : ${p[k]}</span></div>`
    : '').join('');
  document.getElementById('pieLegend').innerHTML = leg;
}

function resetAll() {
  if (!confirm('Réinitialiser toutes les données ?')) return;
  state.scoreA = 0; state.scoreB = 0;
  state.lineOverride = 'F';
  Object.keys(state.pt).forEach(k => { state.pt[k] = 0; state.tot[k] = 0; });
  state.lastPass = null;
  state.pointLog = [];
  state.actionLog = [];
  undoStack.length = 0;
  document.getElementById('btnUndo').disabled = true;
  localStorage.removeItem('ult_mix_score');
  document.getElementById('saveDot').className = 'save-dot ok';
  document.getElementById('saveLabel').textContent = 'Saved';
  showTab('players')
  // ============================================
  // RESET PLAYER STATS
  // ============================================

  Object.keys(playerStats).forEach(name => {

    playerStats[name] = {
      touches: 0,
      completions: 0,
      assists: 0,
      goals: 0,
      drops: 0,
      throwaways: 0,
      defenses: 0,
      pointsPlayed: 0
    };
  });

  // ============================================
  // RESET THROW CONNECTIONS
  // ============================================

  state.throwConnections = {};
  players.forEach(player => {
    state.throwConnections[player.name] = {};
  });

  // ============================================
  // RESET GAMEPLAY STATE
  // ============================================

  currentThrower = null;
  activePlayers = [];
  possession = "offense";
  pendingDefense = false;
  injuryMode = false;
  injuredPlayer = null;
  statusMessage = "Let's start again";
  currentPossessionPasses = 0
  longestPossession = 0
    render();
}

function updateNames() {
  const a = document.getElementById('nameA').value || 'Team A';
  const b = document.getElementById('nameB').value || 'Team B';
  document.getElementById('lblA').textContent = a.toUpperCase();
  document.getElementById('lblB').textContent = b.toUpperCase();
}

function flashScore(id) {
  const el = document.getElementById(id);
  el.classList.remove('flash');
  void el.offsetWidth;
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 350);
}


function showTab(name) {

  // Update tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.remove('active');
    if (
      tab.getAttribute('onclick')
        ?.includes(`showTab('${name}')`)
    ) {
      tab.classList.add('active');
    }
  });

  // Update panes
  document.querySelectorAll('.pane').forEach(p => {
    p.classList.remove('active');
    if (p.id === 'pane-' + name) {
      p.classList.add('active');
    }
  });

  // Lazy rendering
  if (name === 'stats') {
    renderStatsTab();
  }
}


function renderPlayerButtons() {

  const container = document.getElementById("playerButtons");

  container.innerHTML = "";

  [...activePlayers]
    .sort((a, b) => {

      const playerA =
        players.find(p => p.name === a);

      const playerB =
        players.find(p => p.name === b);

      // women first
      if (playerA.gender !== playerB.gender) {
        return playerA.gender === 'F' ? -1 : 1;
      }

      // alphabetical inside gender
      return a.localeCompare(b);
    })
    
    .forEach(playerName => {

      const player =
        players.find(p => p.name === playerName);

      const btn = document.createElement("button");

      btn.className = "player-btn";

      if (player.gender === "F") {
        btn.classList.add("female");
      }
      else {
        btn.classList.add("male");
      }

      btn.textContent = player.name;

    // ============================================
    // NO CURRENT THROWER
    // ============================================

    if (!currentThrower) {

      btn.style.borderColor = "var(--amber)";

      // --------------------------------------------
      // INTERCEPTION
      // --------------------------------------------

      if (pendingDefense === "interception") {

        btn.onclick = () => {
          pushUndo();
          playerStats[player.name].defenses++;
          playerStats[player.name].touches++;

          currentThrower = player.name;
          statusMessage = `${currentThrower} intercepted the disc`;
          logEvent(`${currentThrower} intercepted the disc`)
          pendingDefense = false;

          render();
        };
      }

      // --------------------------------------------
      // DEFENSE (block)
      // --------------------------------------------

      else if (pendingDefense === true) {

        btn.onclick = () => {
          pushUndo();
          playerStats[player.name].defenses++;
          statusMessage = `${player.name} made the D. Select who picks up the disc`;
          logEvent(`${player.name} made the D`);
          pendingDefense = "pickup";

          render();
        };
      }

      // --------------------------------------------
      // PICKUP AFTER DEFENSE
      // --------------------------------------------

      else if (pendingDefense === "pickup") {

        btn.onclick = () => {

          setInitialThrower(player.name);
        };
      }

      // --------------------------------------------
      // NORMAL PICKUP
      // --------------------------------------------

      else {

        btn.onclick = () => {

          setInitialThrower(player.name);
        };
      }
    }

    // ============================================
    // NORMAL PASS
    // ============================================

    else {

      // prevent self-pass
      if (player.name === currentThrower) {

        btn.disabled = true;
        btn.style.opacity = 0.3;
      }

      else {

        btn.onclick = () => recordPass(player.name);
      }
    }

    container.appendChild(btn);
  });

  // ============================================
  // CURRENT STATUS DISPLAY
  // ============================================

  const display =
    document.getElementById("statusMessageDisplay");

  if (!display) return;

  display.textContent = statusMessage;
}

function renderRosterButtons() {

  const container = document.getElementById("rosterButtons");

  container.innerHTML = "";

  players.forEach(player => {

    const selected =
      activePlayers.includes(player.name);

    const btn = document.createElement("button");
    
    btn.className =
      "roster-btn " +
      (player.gender === "F" ? "female " : "male ") +
      (selected ? "selected" : "");

    btn.textContent = player.name;

    // VISUAL FEEDBACK FOR INJURY MODE
    if (injuryMode && player.name === injuredPlayer) {
      btn.style.border = "3px solid red";
    }

    btn.onclick = () => {

      // NORMAL LINE SELECTION MODE
      if (!injuryMode) {
        toggleActivePlayer(player.name);
        return;
      }

      // =========================
      // INJURY REPLACEMENT MODE
      // =========================

      // STEP 1:
      // Select injured player
      if (!injuredPlayer) {

        // can only select active player
        if (!activePlayers.includes(player.name)) {
          return;
        }

        injuredPlayer = player.name;

        renderRosterButtons();

        return;
      }

      // STEP 2:
      // Select replacement player
      else {

        // replacement must NOT already
        // be on the field
        if (activePlayers.includes(player.name)) {
          return;
        }

        // remove injured player
        activePlayers =
          activePlayers.filter(
            p => p !== injuredPlayer
          );

        // add replacement
        activePlayers.push(player.name);

        // if injured player had the disc,
        // replacement becomes thrower
        if (currentThrower === injuredPlayer) {
        currentThrower = player.name;
        }

        //add a point played for the replacement player
        playerStats[player.name].pointsPlayed++;

        //Status Message
        statusMessage = `${player.name} replaced ${injuredPlayer}`;
        logEvent(`Injury. ${player.name} replaced ${injuredPlayer}`);

        // reset injury mode
        injuredPlayer = null;
        injuryMode = false;

        // return to game
        showTab(possession);

        render();
      }
    };

    container.appendChild(btn);
  });

  document.getElementById("activeCount").textContent =
    activePlayers.length;

  document.getElementById("startPointBtn").disabled =
    activePlayers.length !== 7;

  // PROMPT TEXT
  const prompt =
    document.getElementById("playersPrompt");

  if (prompt) {

    if (!injuryMode) {
      prompt.textContent = "";
    }

    else if (!injuredPlayer) {
      prompt.textContent =
        "Select injured player";
    }

    else {
      prompt.textContent =
        `Select replacement for ${injuredPlayer}`;
    }
  }
}

function renderPlayerConnectionChart(playerName, canvasId) {
  const canvas =
    document.getElementById(canvasId);

  if (!canvas) return;

  const ctx =
    canvas.getContext('2d');

  ctx.clearRect(0, 0, 120, 120);

  const connections =
    state.throwConnections[playerName];

  if (!connections) return;

  const receivers =
    Object.keys(connections)
      .sort((a, b) =>
        connections[b] - connections[a]
      );

  if (receivers.length === 0) {

    ctx.fillStyle = '#333';

    ctx.beginPath();
    ctx.arc(60, 60, 45, 0, Math.PI * 2);
    ctx.fill();

    return;
  }

  const values =
    receivers.map(r => Number(connections[r]) || 0);

  const total =
    values.reduce((a, b) => a + b, 0);

  // persistent player -> color mapping
  if (!window.playerConnectionColors) {
    window.playerConnectionColors = {};
  }

  const colorMap = window.playerConnectionColors;

  const connectionColors = [
    '#e8547a', // pink
    '#1abc9c', // teal
    '#f5a623', // amber
    '#4a9eff', // blue
    '#9b59b6', // purple
    '#3ecf7c', // green
    '#e67e22', // orange
    '#00bcd4', // cyan
    '#c0392b', // dark red
    '#8bc34a', // lime
    '#ff6b81', // rose
    '#34495e', // slate
    '#ffcc00', // yellow
    '#6c5ce7', // indigo
    '#fd79a8', // light pink
    '#00cec9', // aqua
    '#d63031', // red
    '#0984e3', // bright blue
    '#e17055', // coral
    '#2ecc71', // emerald
    '#f39c12', // gold
    '#7f8c8d', // gray
    '#27ae60', // dark green
    '#8e44ad'  // deep purple
  ];

  // assign colors permanently
  receivers.forEach(receiver => {

    if (!colorMap[receiver]) {

      const usedColors =
        Object.keys(colorMap).length;

      colorMap[receiver] =
        connectionColors[
          usedColors % connectionColors.length
        ];
    }
  });

  let start = -Math.PI / 2;

  receivers.forEach((receiver) => {

    const value = connections[receiver];

    const slice =
      value / total * Math.PI * 2;

    const color =
      colorMap[receiver];

    ctx.beginPath();
    ctx.moveTo(60, 60);
    ctx.arc(60, 60, 45, start, start + slice);
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.fill();

    start += slice;
  });

  // legend
  const legend =
    document.getElementById('legend-' + canvasId);

  legend.innerHTML = receivers.map((receiver) => {

    const color =
      colorMap[receiver];

    return `

      <div class="player-chart-item">

        <div
          class="player-chart-dot"
          style="background:${color}">
        </div>

        <div style="color:${color}; font-weight:600;">

          ${receiver}:

          <span style="opacity:0.85;">
            ${connections[receiver]}
          </span>

        </div>

      </div>
    `;
  }).join('');
}

function loadSession() {
  try {
    const raw = localStorage.getItem('ult_mix_score');
    if (!raw) return;
    const snap = JSON.parse(raw);
    Object.assign(state, snap.state);
    document.getElementById('nameA').value = snap.nameA || 'Team A';
    document.getElementById('nameB').value = snap.nameB || 'Team B';
    if (snap.matchDate) document.getElementById('matchDate').value = snap.matchDate;
    updateNames();
  } catch(e) { console.warn('loadSession failed', e); }
}

function saveSession() {
  const snap = {
    state: structuredClone(state),
    nameA: document.getElementById('nameA').value,
    nameB: document.getElementById('nameB').value,
    matchDate: document.getElementById('matchDate').value,
    at: new Date().toISOString()
  };
  localStorage.setItem('ult_mix_score', JSON.stringify(snap));
  const dot = document.getElementById('saveDot');
  const lbl = document.getElementById('saveLabel');
  dot.className = 'save-dot ok';
  lbl.textContent = 'Saved';
}

function exportXLSX() {

  const teamA =
    document.getElementById('nameA').value || 'Team A';

  const teamB =
    document.getElementById('nameB').value || 'Team B';

  const date =
    document.getElementById('matchDate').value ||
    new Date().toISOString().slice(0,10);

  const p = state.tot;
  
  const totalCompletions =
    p.FF + p.MM + p.FM + p.MF;

  const mixed =
    p.FM + p.MF;

  const totalThrowaways =
    Object.values(playerStats)
      .reduce((sum, s) => sum + s.throwaways, 0);

  const totalDrops =
    Object.values(playerStats)
      .reduce((sum, s) => sum + s.drops, 0);

  const totalTurnovers =
    totalThrowaways + totalDrops;

  const totalDefenses =
    Object.values(playerStats)
      .reduce((sum, s) => sum + s.defenses, 0);

  const totalAttempts =
    totalThrowaways + totalCompletions;

  const partialCompletionPct =
    (totalCompletions + totalThrowaways) > 0
      ? +(
          totalCompletions /
          (totalCompletions + totalThrowaways) *
          100
        ).toFixed(1)
      : 0;
  const totalCompletionPct =
  (totalCompletions + totalTurnovers) > 0
    ? +(
        totalCompletions /
        (totalCompletions + totalTurnovers) *
        100
      ).toFixed(1)
    : 0;

  const wb = XLSX.utils.book_new();

  // =================================================
  // SUMMARY SHEET
  // =================================================

  const ws1 = XLSX.utils.aoa_to_sheet([
    ['Match', `${teamA} vs ${teamB}`],
    ['Date', date],
    ['Score ' + teamA, state.scoreA],
    ['Score ' + teamB, state.scoreB],
    [],
    ['— TOTALS —'],
    ['Type', 'Total'],
    ['Attempted passes', totalAttempts],
    ['Completions', totalCompletions],
    ['Total Turnovers', totalTurnovers],
    ['Throwaways', totalThrowaways],
    ['Drops', totalDrops],
    ['Completion % (Excluding drops)', partialCompletionPct],
    ['Completion % (Including drops)', totalCompletionPct],
    ['Defenses', totalDefenses],
    ['Longest possession', Math.max(longestPossession, currentPossessionPasses)],
    [],
    ['— MIXITY —'],
    ['Type', 'Amount', '% of total'],
    ['FMP → FMP', p.FF, totalCompletions > 0 ? +(p.FF/totalCompletions*100).toFixed(1) : 0],
    ['MMP → MMP', p.MM, totalCompletions > 0 ? +(p.MM/totalCompletions*100).toFixed(1) : 0],
    ['FMP → MMP', p.FM, totalCompletions > 0 ? +(p.FM/totalCompletions*100).toFixed(1) : 0],
    ['MMP → FMP', p.MF, totalCompletions > 0 ? +(p.MF/totalCompletions*100).toFixed(1) : 0],
    ['TOTAL', totalCompletions, 100],
    ['Mixed Passes', mixed, totalCompletions > 0 ? +(mixed/totalCompletions*100).toFixed(1) : 0],
    [],
    
    
  ]);

  XLSX.utils.book_append_sheet(
    wb,
    ws1,
    'Summary'
  );

  // =================================================
  // LOG SHEET
  // =================================================


  const logData = [
    ["Event Log"],
    ...eventTextLog.map(e => [e])
  ];

  const wsLog = XLSX.utils.aoa_to_sheet(logData);

  XLSX.utils.book_append_sheet(wb, wsLog, "Log");

  // =================================================
  // PLAYER STATS SHEET
  // =================================================

  const playerRows = [[
    'Player',
    'Gender',
    'Points played',
    'Touches',
    'Completions',
    'Completion %',
    'Assists',
    'Goals',
    'Drops',
    'Throwaways',
    'Defenses',
  ]];

  players.forEach(player => {

    const s = playerStats[player.name];

    playerRows.push([
      player.name,
      player.gender,
      s.pointsPlayed || 0,
      s.touches || 0,
      s.completions || 0,
      (s.completions + s.throwaways) > 0
        ? Math.round(
            s.completions /
            (s.completions + s.throwaways) *
            100
          )
        : 0,
      s.assists || 0,
      s.goals || 0,
      s.drops || 0,
      s.throwaways || 0,
      s.defenses || 0
    ]);
  });

  XLSX.utils.book_append_sheet(
    wb,
    XLSX.utils.aoa_to_sheet(playerRows),
    'Player Stats'
  );

  // =================================================
  // THROW CONNECTIONS SHEET
  // =================================================

  const connectionRows = [[
    'Thrower',
    'Receiver',
    'Completions'
  ]];

  Object.keys(state.throwConnections).forEach(thrower => {

    const targets =
      state.throwConnections[thrower];

    Object.keys(targets).forEach(receiver => {

      connectionRows.push([
        thrower,
        receiver,
        targets[receiver]
      ]);
    });
  });

  XLSX.utils.book_append_sheet(
    wb,
    XLSX.utils.aoa_to_sheet(connectionRows),
    'Throw Connections'
  );


  // =================================================
  // EXPORT FILE
  // =================================================

  XLSX.writeFile(
    wb,
    `ultimate_${teamA.replace(/\s+/g,'_')}_vs_${teamB.replace(/\s+/g,'_')}_${date}.xlsx`
  );
}

function copySessionLink() {
  const snap = {
    state: structuredClone(state),
    nameA: document.getElementById('nameA').value,
    nameB: document.getElementById('nameB').value,
    matchDate: document.getElementById('matchDate').value,
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(snap))));
  const url = location.href.split('?')[0] + '?s=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btnLink');
    btn.textContent = '✓ Copié !';
    setTimeout(() => btn.textContent = 'Lien session', 2000);
  }).catch(() => {
    prompt('Copie ce lien :', url);
  });
}

function loadFromURL() {
  try {
    const params = new URLSearchParams(location.search);
    const s = params.get('s');
    if (!s) return false;
    const snap = JSON.parse(decodeURIComponent(escape(atob(s))));
    Object.assign(state, snap.state);
    document.getElementById('nameA').value = snap.nameA || 'Team A';
    document.getElementById('nameB').value = snap.nameB || 'Team B';
    if (snap.matchDate) document.getElementById('matchDate').value = snap.matchDate;
    updateNames();
    return true;
  } catch(e) { console.warn('loadFromURL failed', e); return false; }
}

// Wake lock: prevent screen from sleeping
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});


function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('ult_theme', isLight ? 'light' : 'dark');
  document.getElementById('btnTheme').textContent = isLight ? '🌙' : '☀';
}
